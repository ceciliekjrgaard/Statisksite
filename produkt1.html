<!doctype html>
<html lang="da">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="produktliste.html" />
    <link rel="stylesheet" href="index.html" />
    <title>Produkt</title>
  </head>
  <body>
    <main>
      <h1>ActiveGoods</h1>
      <div><a href="index.html" class="forsideknap">Forside</a></div>
      <div><a href="produktliste.html" class="tilbageknap">Tilbage</a></div>
      <section class="product_list_container1">
        <div class="produktelement1">
          <a href="product.html" class="product_card on_sale">
            <img src="https://kea-alt-del.dk/t7/images/webp/640/1571.webp" alt="" />
            <h3>Træningsko</h3>
            <p class="p1">Kalenji</p>
            <p class="price"><span class="old_price">DKK 649,-</span> DKK 389,-</p>
          </a>
        </div>

        <section class="productDetails">
          <h2 class="productName">Træningssko</h2>
          <div>
            <p class="articleType"><span class="bold">Model:</span> Træning</p>
            <p class="productCategory"><span class="bold">Kategori:</span> Sko</p>
            <p class="productPrice"><span class="bold">Pris:</span> 389,-</p>
          </div>
        </section>
        <div class="produktkort">
          <h2>KURV</h2>

          <p class="brand">Kalenji | Træningssko</p>

          <div class="valg">
            <label>Vælg størrelse</label>
            <select>
              <option>38</option>
              <option>39</option>
              <option>40</option>
              <option>41</option>
              <option>42</option>
              <option>43</option>
            </select>
          </div>
          <button>Tilføj til kurv</button>
          <button class="buyButton">Køb nu</button>
        </div>
      </section>
    </main>
  </body>
</html>
