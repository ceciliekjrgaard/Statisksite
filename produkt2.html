<!doctype html>
<html lang="da">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="produktliste.html" />
    <link rel="stylesheet" href="index.html" />
    <title>Produkt</title>
  </head>
  <body>
    <main>
      <h1>ActiveGoods</h1>
      <div><a href="index.html" class="forsideknap">Forside</a></div>
      <div><a href="produktliste.html" class="tilbageknap">Tilbage</a></div>
      <section class="product_list_container1">
        <div class="produktelement1">
          <a href="product.html" class="product_card soldout">
            <img src="https://kea-alt-del.dk/t7/images/webp/640/1550.webp" alt="" />
            <h3>Fodbold</h3>
            <p class="p1">Puma</p>
            <p class="price"><span>DKK 299,-</span></p>
          </a>
        </div>

        <section class="productDetails">
          <h2 class="productName">Fodbold</h2>
          <div>
            <p class="articleType"><span class="bold">Farve:</span> Sort</p>
            <p class="productCategory"><span class="bold">Kategori:</span> Sport</p>
            <p class="productPrice"><span class="bold">Pris:</span> 299,-</p>
          </div>
        </section>
        <div class="produktkort">
          <h2>KURV</h2>

          <p class="brand">Puma | Fodbold</p>

          <div class="valg">
            <label>Vælg en farve</label>
            <select>
              <option>Orange</option>
              <option>Grøn</option>
              <option>Blå</option>
            </select>
          </div>
          <button>Tilføj til kurv</button>
          <button class="buyButton">Køb nu</button>
        </div>
      </section>
    </main>
  </body>
</html>
